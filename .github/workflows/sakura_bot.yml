name: Sakura Renai Mode Xbot Bot

on:
  schedule:
    - cron: '0 23,3,11 * * *'  # 1日3回：朝8:00 (UTC 23:00)、昼12:00 (UTC 3:00)、夜20:00 (UTC 11:00) に自動実行
  workflow_dispatch:          # 手動実行も可能にします

permissions:
  contents: write             # ローテーション状況(state.json)を保存するために書き込み権限を付与

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # 1. コードのチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python環境のセットアップ
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 3. 依存ライブラリのインストール
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 3.5. Playwrightブラウザのセットアップ
      - name: Install Playwright Browser
        run: |
          playwright install chromium

      # 3.6. Xログインクッキーの復元
      - name: Restore X session cookies
        env:
          X_COOKIE_JSON: ${{ secrets.X_COOKIE_JSON }}
        run: |
          if [ -n "$X_COOKIE_JSON" ]; then
            echo "$X_COOKIE_JSON" > sakura_cookies.json
            echo "✅ X session cookies successfully restored."
          else
            echo "❌ X_COOKIE_JSON secret is empty or not set. Browser mode will fail without cookies."
            exit 1
          fi

      # 4. ボットスクリプトの実行 (ブラウザ自動化モードで実行)
      - name: Run Auto-Poster Bot
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          PUBLISH_MODE: browser # ブラウザ自動投稿モードで動作
          X_COOKIE_PATH: sakura_cookies.json
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
        run: python main.py

      # 5. ローテーション状態の自動セーブ（state.jsonの更新をGitHubに保存）
      - name: Commit and push state updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add state.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update sakura rotation state [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi
